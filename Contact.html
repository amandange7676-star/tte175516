                function loadHeaderFooter(id, file) {
                    $("#" + id).load(file, function (response, status, xhr) {
                        if (status === "error") {
                            console.error("Error loading " + file + ":", xhr.status, xhr.statusText);
                            return;
                        }

                        $("#" + id).find("a").addClass("edit-site");
                            if (id === "header") {
                                const header = $("#" + id);
                                header.find(".main-header-section").hide();
                                header.find(".header-breadcrumb-section").hide();
                                const currentPage = (document.title || "").trim().toLowerCase();
                                if (currentPage === "index" || currentPage === "home") {
                                    header.find(".main-header-section").css("display", "block");
                                } else {
                                    header.find(".header-breadcrumb-section").css("display", "block");
                                    const displayName = toDisplayName(currentPage);
                                    header.find(".header-breadcrumb-section .Page_name")
                                        .text(displayName.charAt(0).toUpperCase() + displayName.slice(1));
                                }
                            }
                    });
                }
